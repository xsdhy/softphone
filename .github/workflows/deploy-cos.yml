name: Deploy to Tencent COS

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      COS_SECRET_ID: ${{ secrets.COS_SECRET_ID }}
      COS_SECRET_KEY: ${{ secrets.COS_SECRET_KEY }}
      COS_BUCKET: ${{ secrets.COS_BUCKET }}
      COS_REGION: ${{ secrets.COS_REGION }}
      COS_DEST_PREFIX: ${{ secrets.COS_DEST_PREFIX }}
      CDN_REFRESH_PATHS: ${{ secrets.CDN_REFRESH_PATHS }}
      CDN_REGION: ${{ secrets.CDN_REGION }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Log trigger context
        run: |
          echo "Actor: $GITHUB_ACTOR"
          echo "Ref: $GITHUB_REF"
          echo "SHA: $GITHUB_SHA"
          echo "Run ID: $GITHUB_RUN_ID"
          echo "Workflow: $GITHUB_WORKFLOW"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: yarn

      - name: Show tool versions
        run: |
          node -v
          yarn -v

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build project
        run: |
          yarn build
          echo "Build output (lib/):"
          ls -la lib || { echo "lib directory missing after build"; exit 1; }

      - name: Validate deploy inputs
        run: |
          missing=0
          for var in COS_SECRET_ID COS_SECRET_KEY COS_BUCKET COS_REGION CDN_REFRESH_PATHS; do
            if [ -z "${!var}" ]; then
              echo "::error::Missing required secret: $var"
              missing=1
            else
              echo "Detected $var"
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi
          echo "COS bucket: $COS_BUCKET"
          echo "COS region: $COS_REGION"
          echo "Destination prefix: ${COS_DEST_PREFIX:-/}"
          echo "CDN region: ${CDN_REGION:-ap-guangzhou (default)}"

      - name: Install COS/CDN CLI tools
        run: |
          python -m pip install --upgrade pip
          pip install --no-cache-dir coscmd tccli
          coscmd --version
          tccli --version

      - name: Configure coscmd
        run: |
          coscmd config -a "$COS_SECRET_ID" -s "$COS_SECRET_KEY" -b "$COS_BUCKET" -r "$COS_REGION"
          echo "Configured coscmd for bucket $COS_BUCKET in $COS_REGION"

      - name: Upload build artifacts to COS
        env:
          DEST: ${{ env.COS_DEST_PREFIX }}
        run: |
          target="${DEST:-/}"
          case "$target" in
            /*) ;; # already absolute
            *) target="/$target" ;;
          esac
          echo "Uploading ./lib/ to COS path: $target"
          coscmd upload -rs ./lib/ "$target"
          echo "Listing deployed path for verification:"
          coscmd list "$target" || coscmd list

      - name: Prepare CDN refresh payload
        id: cdn_payload
        run: |
          python - <<'PY'
import os, json
raw = os.environ.get("CDN_REFRESH_PATHS", "").strip()
paths = [line.strip() for line in raw.replace(",", "\n").splitlines() if line.strip()]
if not paths:
    raise SystemExit("No CDN paths provided")
print("Will purge CDN paths:", paths)
with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
    fh.write(f'paths={json.dumps(paths)}\n')
PY

      - name: Configure tccli profile
        run: |
          PROFILE=cos-cdn
          tccli configure set secretId "$COS_SECRET_ID" --profile $PROFILE
          tccli configure set secretKey "$COS_SECRET_KEY" --profile $PROFILE
          tccli configure set region "${CDN_REGION:-ap-guangzhou}" --profile $PROFILE
          tccli configure list --profile $PROFILE

      - name: Refresh CDN cache
        env:
          PROFILE: cos-cdn
        run: |
          paths='${{ steps.cdn_payload.outputs.paths }}'
          echo "Sending CDN purge request for paths: $paths"
          tccli cdn PurgePathCache --profile "$PROFILE" --paths "$paths" --flush-type delete
